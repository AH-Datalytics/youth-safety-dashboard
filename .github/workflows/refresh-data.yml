name: Refresh Data

on:
  schedule:
    - cron: '0 12 * * *' # 7 AM EST / 12:00 UTC daily
  workflow_dispatch:

env:
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download & prepare incidents Parquet
        run: python scripts/prepare-incidents-parquet.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ETL pipelines
        run: npm run refresh-data

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/
          git diff --staged --quiet || git commit -m "chore: refresh data $(date -u +%Y-%m-%d)"
          git push
