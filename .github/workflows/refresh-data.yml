name: Refresh Data

on:
  schedule:
    - cron: '0 12 * * *' # 7 AM EST / 12:00 UTC daily
  workflow_dispatch:

env:
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Download source files from OneDrive
        run: npx tsx scripts/download-sharepoint-files.ts
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Prepare data files (parallel)
        run: |
          python scripts/prepare-incidents-parquet.py &
          python scripts/prepare-cfs-csv.py &
          wait

      - name: Run ETL pipelines
        run: npm run refresh-data

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/
          git diff --staged --quiet || git commit -m "chore: refresh data $(date -u +%Y-%m-%d)"
          git push
