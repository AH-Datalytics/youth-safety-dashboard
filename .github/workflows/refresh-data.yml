name: Refresh Data

on:
  schedule:
    - cron: '0 12 * * *' # 7 AM EST / 12:00 UTC daily
  workflow_dispatch:

env:
  NODE_OPTIONS: --max-old-space-size=8192

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Download source files from OneDrive
        run: npx tsx scripts/download-sharepoint-files.ts
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Prepare data files (parallel)
        # Don't fail the whole job if the incidents parquet prep dies — the
        # incidents ETL falls back to the Socrata JSON API. But do surface it.
        run: |
          timed_run() {
            label="$1"
            shift
            start=$(date +%s)
            echo "[$label] starting at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            "$@"
            rc=$?
            end=$(date +%s)
            echo "[$label] finished in $((end - start))s with exit code $rc"
            return $rc
          }

          timed_run "prepare-incidents-parquet" python scripts/prepare-incidents-parquet.py & pid_inc=$!
          timed_run "prepare-cfs-csv" python scripts/prepare-cfs-csv.py & pid_cfs=$!
          rc=0
          wait $pid_inc || { echo "::warning::prepare-incidents-parquet.py failed; incidents ETL will fall back to Socrata JSON."; }
          wait $pid_cfs || { echo "::error::prepare-cfs-csv.py failed."; rc=1; }
          exit $rc

      - name: Run ETL pipelines
        run: npm run refresh-data

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh data $(date -u +%Y-%m-%d)"
          # Rebase onto any concurrent pushes (e.g. a code change landing
          # mid-run) before pushing, with a few retries to avoid losing data.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest master..."
            git pull --rebase --autostash origin master
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push refreshed data after 5 attempts."
          exit 1
